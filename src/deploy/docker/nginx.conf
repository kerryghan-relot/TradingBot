# Reverse proxy for the TradingBot web dashboard (Flask + React),
# containerised version — proxies to the `web` compose service.
#
# Terminates TLS (self-signed until a domain is configured) and gates
# access with HTTP basic auth, since the app has no auth of its own and
# exposes a write endpoint (config.json editor).
#
# The /.well-known/acme-challenge/ location is already wired so that
# adding Certbot later (once a domain exists) needs no config change:
# point a real server_name here and run certbot with --webroot.

server {
    listen 80;
    server_name _;

    # Let Certbot answer HTTP-01 challenges over plain HTTP later.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/ssl/tradingbot.crt;
    ssl_certificate_key /etc/nginx/ssl/tradingbot.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    auth_basic           "TradingBot Dashboard";
    auth_basic_user_file /etc/nginx/.htpasswd-tradingbot;

    location / {
        # `web` resolves to the gunicorn service on the compose network.
        proxy_pass http://web:8501;

        # The React front polls the JSON API over fetch(); no websocket
        # upgrade is needed.
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
